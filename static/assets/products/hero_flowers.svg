<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="hero-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF8FA;stop-opacity:1" />
    </linearGradient>
    <filter id="hero-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15" flood-color="#FF2D7A" />
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#hero-grad)" rx="20" />
  
  <!-- Flower bouquet wrapper visual -->
  <g transform="translate(250, 250)" filter="url(#hero-shadow)">
    <!-- Leaves -->
    <path d="M-60,-20 C-100,-80 -20,-120 0,-40" fill="#81C784" opacity="0.8" />
    <path d="M60,-20 C100,-80 20,-120 0,-40" fill="#81C784" opacity="0.8" />
    <path d="M-100,-40 C-140,-120 -60,-160 0,-50" fill="#4CAF50" />
    <path d="M100,-40 C140,-120 60,-160 0,-50" fill="#4CAF50" />
    
    <!-- Wrapping Paper -->
    <path d="M-80,-20 L0,180 L80,-20 C100,-80 -100,-80 -80,-20 Z" fill="#FFE0B2" stroke="#BCAAA4" stroke-width="2" />
    <path d="M-60,0 L0,180 L60,0 C80,-50 -80,-50 -60,0 Z" fill="#FFF3E0" />
    
    <!-- Red and Pink Roses group -->
    <!-- Center Rose -->
    <circle cx="0" cy="-60" r="36" fill="#FF2D7A" />
    <circle cx="0" cy="-60" r="28" fill="#FF5C99" />
    <circle cx="0" cy="-60" r="18" fill="#F8BBD0" />
    <circle cx="0" cy="-60" r="8" fill="#FF2D7A" />
    
    <!-- Left Rose -->
    <circle cx="-50" cy="-70" r="28" fill="#D81B60" />
    <circle cx="-50" cy="-70" r="20" fill="#E91E63" />
    <circle cx="-50" cy="-70" r="10" fill="#F48FB1" />
    
    <!-- Right Rose -->
    <circle cx="50" cy="-70" r="28" fill="#D81B60" />
    <circle cx="50" cy="-70" r="20" fill="#E91E63" />
    <circle cx="50" cy="-70" r="10" fill="#F48FB1" />
    
    <!-- Lilies details -->
    <!-- Top Lily -->
    <path d="M0,-120 Q30,-160 0,-200 Q-30,-160 0,-120" fill="#FFFFFF" stroke="#FF5C99" stroke-width="1.5" />
    <path d="M0,-120 Q-40,-140 -80,-140 Q-40,-110 0,-120" fill="#FFFFFF" stroke="#FF5C99" stroke-width="1.5" />
    <path d="M0,-120 Q40,-140 80,-140 Q40,-110 0,-120" fill="#FFFFFF" stroke="#FF5C99" stroke-width="1.5" />
    <circle cx="0" cy="-135" r="4" fill="#FBC02D" />
    
    <!-- Bouquet Ribbon -->
    <path d="M-20,100 L0,90 L20,100 L15,140 L-15,140 Z" fill="#FF2D7A" />
    <circle cx="0" cy="95" r="8" fill="#C89B3C" />
  </g>
</svg>
