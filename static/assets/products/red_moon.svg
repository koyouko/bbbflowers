<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-red_moon_svg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE5EC;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.1" flood-color="#000"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#grad-red_moon_svg)" />
  
  <!-- Vector Floral Details -->
  <g opacity="0.15">
    <circle cx="150" cy="150" r="100" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="10 15" />
    <circle cx="150" cy="150" r="75" fill="none" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Stylized Icon / Flower Representation -->
  <g transform="translate(150, 135)" filter="url(#shadow)">
    <!-- Flower Petals -->
    <path d="M0,-24 C10,-40 -10,-40 0,-24 Z" fill="#FF2D7A" transform="rotate(0)" />
    <path d="M0,-24 C10,-40 -10,-40 0,-24 Z" fill="#FF2D7A" transform="rotate(45)" />
    <path d="M0,-24 C10,-40 -10,-40 0,-24 Z" fill="#FF2D7A" transform="rotate(90)" />
    <path d="M0,-24 C10,-40 -10,-40 0,-24 Z" fill="#FF2D7A" transform="rotate(135)" />
    <path d="M0,-24 C10,-40 -10,-40 0,-24 Z" fill="#FF2D7A" transform="rotate(180)" />
    <path d="M0,-24 C10,-40 -10,-40 0,-24 Z" fill="#FF2D7A" transform="rotate(225)" />
    <path d="M0,-24 C10,-40 -10,-40 0,-24 Z" fill="#FF2D7A" transform="rotate(270)" />
    <path d="M0,-24 C10,-40 -10,-40 0,-24 Z" fill="#FF2D7A" transform="rotate(315)" />
    
    <!-- Flower Center -->
    <circle cx="0" cy="0" r="8" fill="#FFF8E7" stroke="#FF2D7A" stroke-width="2" />
  </g>
  
  <!-- Text Label -->
  <text x="50%" y="270" font-family="'Outfit', sans-serif" font-size="14" font-weight="700" fill="#1F1F1F" text-anchor="middle">Red Moon</text>
  <text x="50%" y="288" font-family="'Outfit', sans-serif" font-size="10" font-weight="500" fill="#777777" text-anchor="middle" letter-spacing="1">LUXURY RED ROSES</text>
</svg>
